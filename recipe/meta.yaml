{% set name = "dicom-anonymizer" %}
{% set version = "1.0.13.post1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dicom_anonymizer-{{ version }}.tar.gz
  sha256: fc5763235c0115f47475acf1a84902c407ad781f5f9425ed65cd1322fb0d76f4

build:
  entry_points:
    - dicom-anonymizer = dicomanonymizer.anonymizer:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - pydicom
    - python >={{ python_min }}
    - tqdm

test:
  imports:
    - dicomanonymizer
  commands:
    - pip check
    - dicom-anonymizer --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/KitwareMedical/dicom-anonymizer
  summary: Program to anonymize dicom files with default and custom rules
  license: BSD-3-Clause
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
